<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>LiveLabel Overlay</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500;600&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:      #0a0a0a;
      --border:  rgba(255,255,255,0.10);
      --text:    #efefef;
      --text-dim:#888888;
      --accent:  #7afcb8;
      --font:    'IBM Plex Mono', monospace;
    }

    html, body {
      height: 100%; width: 100%;
      background: var(--bg);
      color: var(--text);
      font-family: var(--font);
      overflow: hidden;
      border: 1px solid var(--border);
      border-radius: 2px;
    }

    .window {
      display: flex;
      flex-direction: column;
      height: 100%;
    }

    /* ── Drag bar ─────────────────────────────────── */
    .bar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 10px;
      height: 28px;
      flex-shrink: 0;
      border-bottom: 1px solid var(--border);
      cursor: grab;
      user-select: none;
    }
    .bar:active { cursor: grabbing; }

    .bar-left { display: flex; align-items: center; gap: 8px; }
    .bar-dot { width: 4px; height: 4px; background: var(--accent); }
    .bar-title {
      font-size: 8px; font-weight: 600;
      letter-spacing: 0.22em; text-transform: uppercase;
      color: var(--text-dim);
    }

    .close-btn {
      background: none; border: none;
      color: var(--text-dim); font-family: var(--font);
      font-size: 12px; cursor: pointer; line-height: 1;
      padding: 2px 4px;
      transition: color 120ms ease;
    }
    .close-btn:hover { color: var(--text); }

    /* ── Stream ───────────────────────────────────── */
    .stream-wrap {
      flex: 1 1 0;
      overflow: hidden;
      position: relative;
      background: #000;
    }
    .stream-wrap img {
      width: 100%;
      height: 100%;
      object-fit: contain;
      display: block;
    }

    .error-msg {
      display: none;
      position: absolute; inset: 0;
      align-items: center; justify-content: center; flex-direction: column; gap: 8px;
      font-size: 9px; letter-spacing: 0.16em; text-transform: uppercase; color: var(--text-dim);
    }
    .error-msg.visible { display: flex; }

    /* ── Caption ──────────────────────────────────────────────────── */
    .caption-wrap {
      flex-shrink: 0;
      padding: 6px 10px 8px;
      border-top: 1px solid var(--border);
    }
    .caption {
      font-size: 9px; line-height: 1.6; font-style: italic;
      color: var(--text-dim); letter-spacing: 0.04em;
      max-height: 58px; overflow: hidden;
      transition: opacity 0.3s ease;
    }
  </style>
</head>
<body>
<div class="window">

  <div class="bar" id="bar">
    <div class="bar-left">
      <div class="bar-dot"></div>
      <span class="bar-title">LiveLabel — Overlay</span>
    </div>
    <button class="close-btn" id="close-btn" title="Close">✕</button>
  </div>

  <div class="stream-wrap">
    <img id="stream" alt="stream" draggable="false">
    <div class="error-msg" id="error-msg">
      <span>Server offline</span>
      <span style="font-size:8px">Start web_server.py first</span>
    </div>
  </div>

  <div class="caption-wrap">
    <p class="caption" id="caption">Analyzing scene…</p>
  </div>

</div>

<script>
  const { ipcRenderer } = require('electron');

  // ── Port from query param ──────────────────────────────────────
  const params = new URLSearchParams(window.location.search);
  const port = params.get('port') || '5000';
  const streamUrl = `http://localhost:${port}/stream`;

  const streamImg = document.getElementById('stream');
  const errorMsg  = document.getElementById('error-msg');

  streamImg.src = streamUrl;
  streamImg.onerror = () => { errorMsg.classList.add('visible'); };
  streamImg.onload  = () => { errorMsg.classList.remove('visible'); };

  // ── Window drag (frame: false — no native drag handle) ────────
  const bar = document.getElementById('bar');
  let dragging = false, lastX = 0, lastY = 0;

  bar.addEventListener('mousedown', e => {
    if (e.target.id === 'close-btn') return;
    dragging = true;
    lastX = e.screenX;
    lastY = e.screenY;
    e.preventDefault();
  });

  document.addEventListener('mousemove', e => {
    if (!dragging) return;
    const dx = e.screenX - lastX;
    const dy = e.screenY - lastY;
    lastX = e.screenX;
    lastY = e.screenY;
    ipcRenderer.send('drag-delta', { dx, dy });
  });

  document.addEventListener('mouseup', () => { dragging = false; });

  // ── Close ─────────────────────────────────────────────────────
  document.getElementById('close-btn').addEventListener('click', () => {
    ipcRenderer.send('close-window');
  });

  // ── Scene summary caption ──────────────────────────────────────
  const caption = document.getElementById('caption');
  async function pollCaption() {
    try {
      const r = await fetch(`http://localhost:${port}/api/state`);
      if (!r.ok) return;
      const d = await r.json();
      if (d.scene_summary && d.scene_summary !== caption.textContent) {
        caption.style.opacity = '0';
        setTimeout(() => { caption.textContent = d.scene_summary; caption.style.opacity = '1'; }, 300);
      }
    } catch(_) {}
  }
  setInterval(pollCaption, 3000);
  pollCaption();
</script>
</body>
</html>
